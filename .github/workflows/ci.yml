name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ develop ]

jobs:
  frontend_ci:
    runs-on: ubuntu-latest
    
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20 (for Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check Frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint

      - name: Run Frontend tests
        working-directory: frontend
        run: npm run test
      
      - name: Build application (Frontend)
        working-directory: frontend
        run: npm run build
  
  functions_ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (for Functions)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase Functions dependencies
        working-directory: functions
        run: npm ci
      
      - name: Type check Firebase Functions
        working-directory: functions
        run: npx tsc --noEmit
      
      - name: Lint Functions
        working-directory: functions
        run: npm run lint

      - name: Build Firebase Functions (TypeScript to JavaScript)
        working-directory: functions
        run: npm run build